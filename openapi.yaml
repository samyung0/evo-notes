        position:
          format: int64
          type: integer
        sizeKb:
          format: int64
          type: integer
        status:
          $ref: "#/components/schemas/FileStatus"
        url:
          type: string
        workspaceId:
          type: string
      required:
        - id
        - workspaceId
        - chapterId
        - position
        - name
        - kind
        - sizeKb
        - addedAt
      type: object
    FileKind:
      enum:
        - pdf
        - doc
        - md
        - image
        - txt
        - sheet
        - slides
        - video
        - audio
        - json
        - unknown
      type: string
    FileStatus:
      enum:
