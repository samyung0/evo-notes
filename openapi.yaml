components:
  schemas:
    AccessCapabilities:
      additionalProperties: false
      properties:
        canComment:
          type: boolean
        canEdit:
          type: boolean
        canManageMembers:
          type: boolean
        canView:
          type: boolean
      required:
        - canView
        - canEdit
        - canComment
        - canManageMembers
      type: object
    AccessTokenResp:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/AccessTokenResp.json
          format: uri
          readOnly: true
          type: string
        accessToken:
          type: string
      required:
        - accessToken
      type: object
    AddChapterReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/AddChapterReq.json
          format: uri
          readOnly: true
          type: string
        name:
          description: Chapter name
          minLength: 1
          type: string
      required:
        - name
      type: object
    Attempt:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/Attempt.json
          format: uri
          readOnly: true
          type: string
        chapters:
          items:
            type: string
          type: array
        correct:
          format: int64
          type: integer
        id:
          type: string
        pct:
          format: int64
          type: integer
        quizId:
          type: string
        quizName:
          type: string
        takenAt:
          format: date-time
          type: string
        total:
          format: int64
          type: integer
        workspaceName:
          type: string
      required:
        - id
        - quizId
        - quizName
        - workspaceName
        - chapters
        - correct
        - total
        - pct
        - takenAt
      type: object
    AttemptDetail:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/AttemptDetail.json
          format: uri
          readOnly: true
          type: string
        answers:
          additionalProperties: {}
          type: object
        chapters:
          items:
            type: string
          type: array
        correct:
          format: int64
          type: integer
        id:
          type: string
        pct:
          format: int64
          type: integer
        questions:
          items:
            additionalProperties: {}
            type: object
          type: array
        quizId:
          type: string
        quizName:
          type: string
        takenAt:
          format: date-time
          type: string
        total:
          format: int64
          type: integer
        workspaceName:
          type: string
      required:
        - answers
        - questions
        - id
        - quizId
        - quizName
        - workspaceName
        - chapters
        - correct
        - total
        - pct
        - takenAt
      type: object
    BillingCheckoutReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/BillingCheckoutReq.json
          format: uri
          readOnly: true
          type: string
        planTier:
          enum:
            - pro
            - team
          type: string
      required:
        - planTier
      type: object
    BillingInfo:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/BillingInfo.json
          format: uri
          readOnly: true
          type: string
        planTier:
          $ref: "#/components/schemas/PlanTier"
        renewalAt:
          format: date-time
          type: string
        subscriptionStatus:
          $ref: "#/components/schemas/SubscriptionStatus"
      required:
        - planTier
        - subscriptionStatus
      type: object
    Canvas:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/Canvas.json
          format: uri
          readOnly: true
          type: string
        id:
          type: string
        name:
          type: string
        scene: {}
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - name
        - updatedAt
      type: object
    Chapter:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/Chapter.json
          format: uri
          readOnly: true
          type: string
        fileIds:
          items:
            type: string
          type: array
        id:
          type: string
        name:
          type: string
        order:
          format: int64
          type: integer
        workspaceId:
          type: string
      required:
        - id
        - workspaceId
        - name
        - order
        - fileIds
      type: object
    Citation:
      additionalProperties: false
      properties:
        fileId:
          type: string
        fileName:
          type: string
        snippet:
          type: string
      required:
        - fileId
        - fileName
        - snippet
      type: object
    CloneWorkspaceResp:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CloneWorkspaceResp.json
          format: uri
          readOnly: true
          type: string
        ragCloned:
          type: boolean
        workspace:
          $ref: "#/components/schemas/Workspace"
      required:
        - workspace
        - ragCloned
      type: object
    Comment:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/Comment.json
          format: uri
          readOnly: true
          type: string
        contentRich: {}
        createdAt:
          format: date-time
          type: string
        discussionId:
          type: string
        id:
          type: string
        isEdited:
          type: boolean
        updatedAt:
          format: date-time
          type: string
        userId:
          type: string
      required:
        - id
        - discussionId
        - userId
        - contentRich
        - isEdited
        - createdAt
        - updatedAt
      type: object
    ContentOrderItem:
      additionalProperties: false
      properties:
        id:
          minLength: 1
          type: string
        type:
          enum:
            - file
            - material
          type: string
      required:
        - id
        - type
      type: object
    Conversation:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/Conversation.json
          format: uri
          readOnly: true
          type: string
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        title:
          type: string
        updatedAt:
          format: date-time
          type: string
        workspaceId:
          type: string
      required:
        - id
        - workspaceId
        - title
        - createdAt
        - updatedAt
      type: object
    CreateAttemptReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateAttemptReq.json
          format: uri
          readOnly: true
          type: string
        answers:
          additionalProperties: {}
          description: User answers keyed by question id
          type: object
        correct:
          format: int64
          type: integer
        questions:
          description: Question snapshot taken at submit time
          items:
            additionalProperties: {}
            type: object
          nullable: true
          type: array
        total:
          format: int64
          type: integer
        wrong:
          description: Questions answered incorrectly
          items:
            additionalProperties: {}
            type: object
          nullable: true
          type: array
      required:
        - correct
        - total
      type: object
    CreateCanvasReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateCanvasReq.json
          format: uri
          readOnly: true
          type: string
        name:
          type: string
      type: object
    CreateCardReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateCardReq.json
          format: uri
          readOnly: true
          type: string
        back:
          type: string
        front:
          type: string
      type: object
    CreateCommentReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateCommentReq.json
          format: uri
          readOnly: true
          type: string
        contentRich:
          items:
            additionalProperties: {}
            type: object
          nullable: true
          type: array
      required:
        - contentRich
      type: object
    CreateConversationReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateConversationReq.json
          format: uri
          readOnly: true
          type: string
        title:
          description: Optional thread title
          maxLength: 200
          type: string
      type: object
    CreateDeckReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateDeckReq.json
          format: uri
          readOnly: true
          type: string
        color:
          $ref: "#/components/schemas/UserColor"
        name:
          type: string
        workspaceId:
          type: string
      type: object
    CreateDiscussionReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateDiscussionReq.json
          format: uri
          readOnly: true
          type: string
        anchor:
          additionalProperties: {}
          type: object
        blockId:
          type: string
        contentRich:
          items:
            additionalProperties: {}
            type: object
          nullable: true
          type: array
        documentContent:
          type: string
      required:
        - contentRich
      type: object
    CreateEventReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateEventReq.json
          format: uri
          readOnly: true
          type: string
        end:
          format: date-time
          type: string
        labelIds:
          items:
            type: string
          nullable: true
          type: array
        location:
          type: string
        note:
          type: string
        start:
          format: date-time
          type: string
        title:
          minLength: 1
          type: string
      required:
        - title
        - start
        - end
      type: object
    CreateMaterialReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateMaterialReq.json
          format: uri
          readOnly: true
          type: string
        content:
          $ref: "#/components/schemas/Envelope"
          description: Versioned Plate document
        kind:
          description: Material kind; defaults to note
          type: string
        scopeChapters:
          items:
            type: string
          nullable: true
          type: array
        scopeFileIds:
          items:
            type: string
          nullable: true
          type: array
        title:
          type: string
      type: object
    CreateMaterialSuggestionReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateMaterialSuggestionReq.json
          format: uri
          readOnly: true
          type: string
        anchor:
          additionalProperties: {}
          type: object
        baseRevision:
          format: int64
          minimum: 1
          type: integer
        originalFragment:
          items:
            additionalProperties: {}
            type: object
          minItems: 1
          nullable: true
          type: array
        proposedFragment:
          items:
            additionalProperties: {}
            type: object
          minItems: 1
          nullable: true
          type: array
      required:
        - baseRevision
        - originalFragment
        - proposedFragment
      type: object
    CreateQuizReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateQuizReq.json
          format: uri
          readOnly: true
          type: string
        chapters:
          items:
            type: string
          nullable: true
          type: array
        name:
          type: string
        privacy:
          $ref: "#/components/schemas/Privacy"
        questions:
          items:
            additionalProperties: {}
            type: object
          nullable: true
          type: array
        timeLimitMin:
          format: int64
          type: integer
        workspaceId:
          type: string
      type: object
    CreateWorkspaceInviteReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateWorkspaceInviteReq.json
          format: uri
          readOnly: true
          type: string
        identifier:
          description: Exact user ID or email address
          minLength: 1
          type: string
        role:
          $ref: "#/components/schemas/WorkspaceRole"
      required:
        - identifier
        - role
      type: object
    CreateWorkspaceReq:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateWorkspaceReq.json
          format: uri
          readOnly: true
          type: string
        color:
          $ref: "#/components/schemas/UserColor"
          description: User color; defaults to graphite
        name:
          description: Workspace name
          maxLength: 100
          minLength: 1
          type: string
        tags:
          description: Tags; reuse existing by id or create new by value
          items:
            $ref: "#/components/schemas/TagInput"
          nullable: true
          type: array
      required:
        - name
      type: object
    Deck:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/Deck.json
          format: uri
          readOnly: true
          type: string
        cardCount:
          format: int64
          type: integer
        color:
          $ref: "#/components/schemas/UserColor"
        dueCount:
          format: int64
          type: integer
        id:
          type: string
        isOwner:
          type: boolean
        knownPct:
          format: int64
          type: integer
        name:
          type: string
        privacy:
          $ref: "#/components/schemas/Privacy"
        workspaceId:
          type: string
        workspaceName:
          type: string
      required:
        - id
        - name
        - workspaceId
        - workspaceName
        - color
        - privacy
        - cardCount
        - knownPct
        - dueCount
        - isOwner
      type: object
    Discussion:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/Discussion.json
          format: uri
          readOnly: true
          type: string
        anchor: {}
        blockId:
          type: string
        comments:
          items:
            $ref: "#/components/schemas/Comment"
          type: array
        createdAt:
          format: date-time
          type: string
        documentContent:
          type: string
        id:
          type: string
        isResolved:
          type: boolean
        materialId:
          type: string
        updatedAt:
          format: date-time
          type: string
        userId:
          type: string
      required:
        - id
        - materialId
        - anchor
        - userId
        - isResolved
        - createdAt
        - updatedAt
        - comments
      type: object
    Envelope:
      additionalProperties: false
      properties:
        schemaVersion:
          format: int64
          type: integer
        value:
          items:
            additionalProperties: {}
            type: object
          nullable: true
          type: array
      required:
        - schemaVersion
        - value
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    Event:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/Event.json
          format: uri
          readOnly: true
          type: string
        end:
          format: date-time
          type: string
        id:
          type: string
        labelIds:
          items:
            type: string
          type: array
        location:
          type: string
        note:
          type: string
        start:
          format: date-time
          type: string
        title:
          type: string
      required:
        - id
        - title
        - start
        - end
        - labelIds
      type: object
    File:
      additionalProperties: false
