        - title
        - content
        - createdAt
      type: object
    MaterialSuggestion:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/MaterialSuggestion.json
          format: uri
          readOnly: true
          type: string
        anchor:
          additionalProperties: {}
          type: object
        baseRevision:
          format: int64
          type: integer
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        materialId:
          type: string
        originalFragment:
          items:
            additionalProperties: {}
            type: object
          nullable: true
          type: array
        proposedFragment:
          items:
            additionalProperties: {}
            type: object
          nullable: true
