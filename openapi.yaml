        chapterId:
          nullable: true
          type: string
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        position:
          format: int64
          type: integer
        title:
          type: string
        type:
          type: string
      required:
        - id
        - type
        - title
        - chapterId
        - position
        - createdAt
      type: object
    MaterialRevision:
      additionalProperties: false
