        deckId:
          type: string
        front:
          type: string
        id:
          type: string
        known:
          type: boolean
        srs:
          $ref: "#/components/schemas/SrsState"
      required:
        - id
        - deckId
        - front
        - back
        - known
        - srs
      type: object
    IntegrationsStatus:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/IntegrationsStatus.json
          format: uri
          readOnly: true
          type: string
