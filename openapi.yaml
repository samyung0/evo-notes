          type: string
        color:
          $ref: "#/components/schemas/UserColor"
        content:
          $ref: "#/components/schemas/Envelope"
        contentBytes:
          description: UTF-8 byte length of persisted content JSON
          format: int64
          type: integer
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        isOwner:
          type: boolean
        kind:
          type: string
        position:
          format: int64
          type: integer
        privacy:
          $ref: "#/components/schemas/Privacy"
        revision:
          format: int64
          type: integer
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        scopeChapters:
          items:
            type: string
          type: array
        scopeFileIds:
          items:
            type: string
          type: array
        title:
          type: string
        updatedAt:
          format: date-time
          type: string
        workspaceId:
          type: string
        workspaceName:
          type: string
      required:
