        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/File.json
          format: uri
          readOnly: true
          type: string
        addedAt:
          format: date-time
          type: string
        chapterId:
          nullable: true
          type: string
        content:
          type: string
        id:
          type: string
        kind:
          $ref: "#/components/schemas/FileKind"
        name:
