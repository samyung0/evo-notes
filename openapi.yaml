info:
  title: Evo Notes API
  version: 0.1.0
openapi: 3.0.3
paths:
  /api/attempts:
    get:
      operationId: listAttempts
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Attempt"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List attempts
      tags:
        - Quizzes
  /api/billing:
    get:
      operationId: getBilling
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingInfo"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Billing info
      tags:
        - Billing & integrations
  /api/billing/checkout:
    post:
      operationId: billingCheckout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCheckoutReq"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLResp"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Start checkout
      tags:
        - Billing & integrations
  /api/billing/portal:
    post:
      operationId: billingPortal
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLResp"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Open billing portal
      tags:
        - Billing & integrations
  /api/cards/{id}:
    delete:
      operationId: deleteCard
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a card
      tags:
        - Flashcards
    patch:
      operationId: updateCard
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardReq"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flashcard"
