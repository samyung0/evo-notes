        - workspaceName
        - kind
        - title
        - content
        - contentBytes
        - chapterId
        - position
        - scopeChapters
        - scopeFileIds
        - privacy
        - createdAt
        - updatedAt
        - revision
        - isOwner
        - capabilities
      type: object
    MaterialRef:
      additionalProperties: false
