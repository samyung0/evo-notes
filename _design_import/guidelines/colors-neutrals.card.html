<!-- @dsCard group="Colors" viewport="700x150" name="Core neutrals" subtitle="Surfaces & ink scale" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ev-bg); font-family:var(--ev-font-sans); padding:20px; }
  .row { display:flex; gap:12px; }
  .sw { flex:1; }
  .chip { height:54px; border-radius:var(--ev-r-md); border:1px solid var(--ev-border); }
  .n { font-size:12px; font-weight:700; color:var(--ev-ink); margin-top:8px; }
  .h { font-size:11px; color:var(--ev-ink-faint); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="n">White / Surface</div><div class="h">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#fcfcfc"></div><div class="n">Surface 2</div><div class="h">#FCFCFC</div></div>
    <div class="sw"><div class="chip" style="background:#f2f4f3"></div><div class="n">Page bg</div><div class="h">#F2F4F3</div></div>
    <div class="sw"><div class="chip" style="background:#e3e9e4"></div><div class="n">Sage wash</div><div class="h">#E3E9E4</div></div>
    <div class="sw"><div class="chip" style="background:#6b6b6b"></div><div class="n">Ink soft</div><div class="h">#6B6B6B</div></div>
    <div class="sw"><div class="chip" style="background:#222222"></div><div class="n">Ink</div><div class="h">#222222</div></div>
  </div>
</body>
</html>
