<!-- @dsCard group="Colors" viewport="700x172" name="Note & type-tag fills" subtitle="Sticky-note fills + the Course/Workspace tag tints" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ev-bg); font-family:var(--ev-font-sans); padding:20px; }
  .row { display:flex; gap:12px; }
  .note { flex:1; height:90px; border-radius:var(--ev-r-lg); padding:13px; box-sizing:border-box; display:flex; flex-direction:column; justify-content:space-between; }
  .nt { font-size:13px; font-weight:700; }
  .nh { font-size:11px; opacity:.7; }
</style>
</head>
<body>
  <div class="row">
    <div class="note" style="background:#aef07f; color:#2f4a1f"><div class="nt">Green note</div><div class="nh">#AEF07F</div></div>
    <div class="note" style="background:#8c7bd9; color:#fff"><div class="nt">Purple note</div><div class="nh">#8C7BD9</div></div>
    <div class="note" style="background:#eaf3e6; color:#3c5230"><div class="nt">Green soft</div><div class="nh">#EAF3E6</div></div>
    <div class="note" style="background:#e4ecf8; color:#2e6bb0"><div class="nt">Course tag</div><div class="nh">#E4ECF8</div></div>
    <div class="note" style="background:#f6ecdc; color:#a9772a"><div class="nt">Workspace tag</div><div class="nh">#F6ECDC</div></div>
  </div>
</body>
</html>
