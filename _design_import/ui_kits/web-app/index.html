<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evo Notes — Web App</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  /* Single typography knob — every text size in the app is rem-based,
     so changing this one value scales all paragraphs/headers/subheaders. */
  html { font-size: 16px; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--ev-bg-sage); font-family: var(--ev-font-sans); }
  #root { height: 100vh; }
  .ev-frame {
    height: 100%;
    background: var(--ev-bg-page);
    overflow: hidden;
  }
  @media (min-width: 1280px) {
    #root { padding: 24px; }
    .ev-frame {
      max-width: 1320px; height: calc(100vh - 48px); margin: 0 auto;
      border-radius: var(--ev-r-2xl);
      box-shadow: var(--ev-shadow-raised);
    }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.EvoNotesDesignSystem_aff30d;
const { DashboardScreen, WorkspacesScreen, WorkspaceOpenScreen, QuizScreen, FlashcardsScreen, ScheduleScreen, Card, Button, Icon } = NS;

function Placeholder({ title, onNavigate }) {
  const { Sidebar } = NS;
  return (
    <div style={{ display: 'flex', height: '100%', background: 'var(--ev-bg-page)' }}>
      <Sidebar active={title.toLowerCase()} onNavigate={onNavigate} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 14, color: 'var(--ev-ink-faint)' }}>
        <span style={{ width: 56, height: 56, borderRadius: 'var(--ev-r-lg)', background: 'var(--ev-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="files" size={26} color="var(--ev-ink-faint)" />
        </span>
        <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--ev-ink)' }}>{title}</div>
        <div style={{ fontSize: 13.5 }}>This screen isn't part of the kit yet.</div>
        <Button variant="outline" iconLeft="chevronLeft" onClick={() => onNavigate('dashboard')}>Back to dashboard</Button>
      </div>
    </div>
  );
}

function App() {
  const [route, setRoute] = React.useState('dashboard');
  const [wsMode, setWsMode] = React.useState('Chat');

  const navigate = (key) => { if (key === 'logout') return; setRoute(key); };

  let screen;
  if (route === 'dashboard') screen = <DashboardScreen onNavigate={navigate} />;
  else if (route === 'workspaces') screen = <WorkspacesScreen onNavigate={navigate} onOpen={() => setRoute('workspace-open')} />;
  else if (route === 'workspace-open') screen = <WorkspaceOpenScreen onNavigate={navigate} onBack={() => setRoute('workspaces')} initialMode={wsMode} />;
  else if (route === 'quiz') screen = <QuizScreen onNavigate={navigate} />;
  else if (route === 'flashcards') screen = <FlashcardsScreen onNavigate={navigate} />;
  else if (route === 'schedule') screen = <ScheduleScreen onNavigate={navigate} />;
  else screen = <Placeholder title={route.charAt(0).toUpperCase() + route.slice(1)} onNavigate={navigate} />;

  return <div className="ev-frame">{screen}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
