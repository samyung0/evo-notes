<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="XL rounding is the house style" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ev-bg); font-family:var(--ev-font-sans); padding:20px; }
  .row { display:flex; gap:14px; align-items:flex-end; }
  .sw { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:74px; height:58px; background:var(--ev-white); border:1px solid var(--ev-border); }
  .n { font-size:11px; font-weight:700; color:var(--ev-ink); }
  .h { font-size:10px; color:var(--ev-ink-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="border-radius:7px"></div><div class="n">xs</div><div class="h">7px</div></div>
    <div class="sw"><div class="box" style="border-radius:10px"></div><div class="n">sm</div><div class="h">10px</div></div>
    <div class="sw"><div class="box" style="border-radius:12px"></div><div class="n">md</div><div class="h">12px</div></div>
    <div class="sw"><div class="box" style="border-radius:16px"></div><div class="n">lg</div><div class="h">16px</div></div>
    <div class="sw"><div class="box" style="border-radius:20px"></div><div class="n">xl</div><div class="h">20px</div></div>
    <div class="sw"><div class="box" style="border-radius:24px"></div><div class="n">2xl</div><div class="h">24px</div></div>
    <div class="sw"><div class="box" style="border-radius:999px"></div><div class="n">pill</div><div class="h">999px</div></div>
  </div>
</body>
</html>
