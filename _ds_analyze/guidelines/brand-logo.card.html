<!-- @dsCard group="Brand" viewport="700x180" name="Logo" subtitle="Monogram mark + horizontal lockup" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ev-white); font-family:var(--ev-font-sans); padding:0; }
  .wrap { display:flex; align-items:stretch; height:180px; }
  .cell { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
  .cell + .cell { border-left:1px solid var(--ev-line); }
  .dark { background:var(--ev-bg); }
  .cap { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ev-ink-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell"><img src="../assets/logo-mark.svg" width="64" height="64" alt="Evo Notes mark"><span class="cap">Mark</span></div>
    <div class="cell"><img src="../assets/logo-lockup.svg" width="180" height="48" alt="Evo Notes lockup"><span class="cap">Lockup</span></div>
    <div class="cell dark"><img src="../assets/logo-mark.svg" width="48" height="48" alt="Evo Notes mark on wash"><span class="cap">On sage wash</span></div>
  </div>
</body>
</html>
