<!-- @dsCard group="Spacing" viewport="700x172" name="Elevation / shadows" subtitle="Soft, low-contrast lifts" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ev-bg); font-family:var(--ev-font-sans); padding:26px 24px; }
  .row { display:flex; gap:22px; }
  .sw { flex:1; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width:100%; height:62px; background:var(--ev-white); border-radius:var(--ev-r-lg); border:1px solid var(--ev-border); }
  .n { font-size:11px; font-weight:700; color:var(--ev-ink); }
  .h { font-size:10px; color:var(--ev-ink-faint); text-align:center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,.06)"></div><div class="n">sm</div><div class="h">rows, chips</div></div>
    <div class="sw"><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,.04), 0 12px 32px rgba(0,0,0,.05)"></div><div class="n">card</div><div class="h">screen frames</div></div>
    <div class="sw"><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,.05), 0 16px 44px rgba(0,0,0,.07)"></div><div class="n">raised</div><div class="h">hero panels</div></div>
    <div class="sw"><div class="box" style="box-shadow:0 10px 34px rgba(0,0,0,.14)"></div><div class="n">pop</div><div class="h">menus, dialogs</div></div>
  </div>
</body>
</html>
