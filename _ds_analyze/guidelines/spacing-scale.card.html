<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — generous by default" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ev-white); font-family:var(--ev-font-sans); padding:22px 24px; }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .sw { display:flex; flex-direction:column; align-items:center; gap:7px; }
  .bar { background:var(--ev-purple); border-radius:3px; width:18px; }
  .n { font-size:10px; color:var(--ev-ink-faint); }
  .v { font-size:11px; font-weight:700; color:var(--ev-ink); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="bar" style="height:4px"></div><div class="v">1</div><div class="n">4</div></div>
    <div class="sw"><div class="bar" style="height:8px"></div><div class="v">2</div><div class="n">8</div></div>
    <div class="sw"><div class="bar" style="height:12px"></div><div class="v">3</div><div class="n">12</div></div>
    <div class="sw"><div class="bar" style="height:16px"></div><div class="v">4</div><div class="n">16</div></div>
    <div class="sw"><div class="bar" style="height:20px"></div><div class="v">5</div><div class="n">20</div></div>
    <div class="sw"><div class="bar" style="height:24px"></div><div class="v">6</div><div class="n">24</div></div>
    <div class="sw"><div class="bar" style="height:28px"></div><div class="v">7</div><div class="n">28</div></div>
    <div class="sw"><div class="bar" style="height:32px"></div><div class="v">8</div><div class="n">32</div></div>
    <div class="sw"><div class="bar" style="height:40px"></div><div class="v">10</div><div class="n">40</div></div>
    <div class="sw"><div class="bar" style="height:48px"></div><div class="v">12</div><div class="n">48</div></div>
  </div>
</body>
</html>
