<!-- @dsCard group="Type" viewport="700x150" name="Weights" subtitle="Fustat — the single brand typeface" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ev-white); font-family:var(--ev-font-sans); padding:22px 26px; color:var(--ev-ink); }
  .row { display:flex; align-items:baseline; gap:30px; flex-wrap:wrap; }
  .w { font-size:26px; }
  .cap { font-size:11px; color:var(--ev-ink-faint); display:block; margin-top:3px; font-weight:500; }
</style>
</head>
<body>
  <div class="row">
    <div><span class="w" style="font-weight:400;">Aa</span><span class="cap">Regular 400</span></div>
    <div><span class="w" style="font-weight:500;">Aa</span><span class="cap">Medium 500</span></div>
    <div><span class="w" style="font-weight:600;">Aa</span><span class="cap">Semibold 600</span></div>
    <div><span class="w" style="font-weight:700;">Aa</span><span class="cap">Bold 700</span></div>
    <div><span class="w" style="font-weight:800;">Aa</span><span class="cap">Extrabold 800</span></div>
  </div>
</body>
</html>
