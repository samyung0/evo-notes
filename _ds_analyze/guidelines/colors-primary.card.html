<!-- @dsCard group="Colors" viewport="700x150" name="Primary & purple accent" subtitle="Near-black actions + brand purple" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ev-bg); font-family:var(--ev-font-sans); padding:20px; }
  .row { display:flex; gap:12px; }
  .sw { flex:1; }
  .chip { height:54px; border-radius:var(--ev-r-md); border:1px solid var(--ev-border); }
  .n { font-size:12px; font-weight:700; color:var(--ev-ink); margin-top:8px; }
  .h { font-size:11px; color:var(--ev-ink-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#222222"></div><div class="n">Primary</div><div class="h">#222222</div></div>
    <div class="sw"><div class="chip" style="background:#8c7bd9"></div><div class="n">Purple</div><div class="h">#8C7BD9</div></div>
    <div class="sw"><div class="chip" style="background:#7866cf"></div><div class="n">Purple hover</div><div class="h">#7866CF</div></div>
    <div class="sw"><div class="chip" style="background:#ece6f6"></div><div class="n">Purple soft</div><div class="h">#ECE6F6</div></div>
    <div class="sw"><div class="chip" style="background:#5b4aa8"></div><div class="n">Purple ink</div><div class="h">#5B4AA8</div></div>
  </div>
</body>
</html>
