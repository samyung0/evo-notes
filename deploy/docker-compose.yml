# Dev stack for the Evo Notes backend.
#   docker compose -f deploy/docker-compose.yml up --build
#
# - db        : Postgres 16 + pgvector + Apache AGE (LightRAG's KV/vector/graph/
#               doc-status backends). Built from deploy/postgres/Dockerfile;
#               AGE is preloaded via `-c shared_preload_libraries=age`.
# - redis     : pub/sub bus for live ingest progress (worker -> server -> SSE).
# - server    : Go gateway (the frontend's /api). Writes uploads to Backblaze
#               B2, subscribes to Redis and fans progress out over SSE.
# - worker    : Python ingest worker (LightRAG). Parses on Modal (GPU MineRU),
#               builds the LightRAG graph in Postgres, publishes progress.
# - retrieval : Python FastAPI chat/generate over the per-workspace LightRAG.
#
# Worker downloads B2 objects before parsing. Real ingest needs B2 credentials,
# API keys (DeepSeek/OpenRouter/Google), and a deployed Modal parse URL.
# Set them in deploy/.env (see .env.example) or the shell environment.

services:
  db:
    build:
      context: ./postgres
    command: ['postgres', '-c', 'shared_preload_libraries=age']
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: evo
      POSTGRES_DB: evo
    ports:
      # 5432 for the usual case; 5433 is an escape hatch for hosts that already
      # run a native Postgres on 5432 (which would otherwise shadow this one for
      # host-side tools like the pytest suite — see pipeline/tests/README.md).
      - '5432:5432'
      - '5433:5432'
    volumes:
      - evo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evo -d evo']
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  server:
    build:
      context: ../server
    environment:
      DATABASE_URL: postgres://evo:evo@db:5432/evo?sslmode=disable
      ADDR: ':8080'
      MIGRATE: 'true'
      # Backblaze B2 source-object storage.
      B2_ENDPOINT: ${B2_ENDPOINT:-}
      B2_REGION: ${B2_REGION:-}
      B2_BUCKET: ${B2_BUCKET:-}
      B2_KEY_ID: ${B2_KEY_ID:-}
      B2_APP_KEY: ${B2_APP_KEY:-}
      B2_FORCE_PATH_STYLE: ${B2_FORCE_PATH_STYLE:-}
      B2_PRESIGN_TTL: ${B2_PRESIGN_TTL:-}
      REDIS_URL: redis://redis:6379/0
      # Vestigial labels stored on the job payload; the worker always uses
      # LightRAG + Modal MineRU regardless.
      EVO_PARSER: ${EVO_PARSER:-mineru}
      EVO_ENGINE: ${EVO_ENGINE:-lightrag}
      PIPELINE_URL: http://retrieval:8001
      APP_URL: ${APP_URL:-http://localhost:5173}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      AUTH_DISABLED: ${AUTH_DISABLED:-true}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_TEAM: ${STRIPE_PRICE_TEAM:-}
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../pipeline
    environment:
      DATABASE_URL: postgres://evo:evo@db:5432/evo?sslmode=disable
      # Backblaze B2 source-object storage.
      B2_ENDPOINT: ${B2_ENDPOINT:-}
      B2_REGION: ${B2_REGION:-}
      B2_BUCKET: ${B2_BUCKET:-}
      B2_KEY_ID: ${B2_KEY_ID:-}
      B2_APP_KEY: ${B2_APP_KEY:-}
      REDIS_URL: redis://redis:6379/0
      WORKING_DIR: /data/rag_storage
      EVO_LIGHTRAG_CACHE_SIZE: ${EVO_LIGHTRAG_CACHE_SIZE:-16}
      # Modal GPU MineRU parse service (custom "modal" LightRAG parser engine).
      MODAL_PARSE_URL: ${MODAL_PARSE_URL:-}
      MODAL_PARSE_TOKEN: ${MODAL_PARSE_TOKEN:-}
      MODAL_PARSE_TIMEOUT: ${MODAL_PARSE_TIMEOUT:-600}
      EVO_PARSE_METHOD: ${EVO_PARSE_METHOD:-auto}
      MAX_PARALLEL_PARSE_MODAL: ${MAX_PARALLEL_PARSE_MODAL:-2}
      # Embeddings (OpenRouter) — EMBEDDING_DIM is permanent for the vector store.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      EVO_MODEL_EMBEDDING: ${EVO_MODEL_EMBEDDING:-qwen/qwen3-embedding-4b}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-2560}
      # Text LLM (DeepSeek): flash for ingest extraction.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      EVO_MODEL_EXTRACTION: ${EVO_MODEL_EXTRACTION:-deepseek-v4-flash}
      # Vision/caption (Gemini, OpenAI-compatible endpoint).
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      EVO_MODEL_IMAGE_CAPTION: ${EVO_MODEL_IMAGE_CAPTION:-gemini-3.1-flash-lite-preview}
    volumes:
      - evo_rag:/data/rag_storage
    command: ['python', '-m', 'pipeline.ingest.worker']
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  retrieval:
    build:
      context: ../pipeline
    environment:
      DATABASE_URL: postgres://evo:evo@db:5432/evo?sslmode=disable
      WORKING_DIR: /data/rag_storage
      EVO_LIGHTRAG_CACHE_SIZE: ${EVO_LIGHTRAG_CACHE_SIZE:-16}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      EVO_MODEL_EMBEDDING: ${EVO_MODEL_EMBEDDING:-qwen/qwen3-embedding-4b}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-2560}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      # Query keeps both reachable; defaults to pro, flash selectable per request.
      EVO_QUERY_MODEL: ${EVO_QUERY_MODEL:-deepseek-v4-pro}
      EVO_QUERY_MODEL_ALT: ${EVO_QUERY_MODEL_ALT:-deepseek-v4-flash}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      EVO_MODEL_IMAGE_CAPTION: ${EVO_MODEL_IMAGE_CAPTION:-gemini-3.1-flash-lite-preview}
    ports:
      - '8001:8001'
    volumes:
      - evo_rag:/data/rag_storage
    command: ['uvicorn', 'pipeline.retrieve.service:app', '--host', '0.0.0.0', '--port', '8001']
    depends_on:
      db:
        condition: service_healthy

  reconcile:
    build:
      context: ../server
    entrypoint: ['/app/reconcile']
    environment:
      DATABASE_URL: postgres://evo:evo@db:5432/evo?sslmode=disable
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_TEAM: ${STRIPE_PRICE_TEAM:-}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - reconcile

volumes:
  evo_pgdata:
  evo_rag:
