      source text.\\n  - Do not extract, infer, or copy entities or relationships
      from the output format template.\\n  - Angle-bracket tokens such as `<entity_name>`
      are placeholders. Replace them with values extracted from the current `---Input
      Text---` section and never output the placeholders literally.\\n\\n9. **Completion
      Signal:** Output the literal string `<|COMPLETE|>` only after all entities and
      relationships have been completely extracted and outputted.\\n\\n---Entity Types---\\nClassify
      each entity using one of the following types. If no type fits, use `Other`.\\n\\n-
