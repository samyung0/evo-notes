      word (title case). Ensure **consistent naming** across the entire extraction
      process.\\n    - `entity_type`: Categorize the entity using the type guidance
      provided in the `---Entity Types---` section below. If none of the provided
      entity types apply, classify it as `Other`.\\n    - `entity_description`: Provide
      a concise yet comprehensive description of the entity's attributes and activities,
      based *solely* on the information present in the input text.\\n\\n2. **Relationship
      Extraction:**\\n  - Identify direct, clearly stated, and meaningful relationships
      between previously extracted entities.\\n  - If a single statement describes
      a relationship involving more than two entities, decompose it into multiple
      binary relationships.\\n  - For each binary relationship, extract:\\n    - `source_entity`:
      The name of the source entity. Ensure **consistent naming** with entity extraction.
      Capitalize the first letter of each significant word (title case) if the name
      is case-insensitive.\\n    - `target_entity`: The name of the target entity.
      Ensure **consistent naming** with entity extraction. Capitalize the first letter
      of each significant word (title case) if the name is case-insensitive.\\n    -
      `relationship_keywords`: One or more high-level keywords summarizing the relationship.
      Multiple keywords within this field must be separated by a comma `,`. **DO NOT
      use `<|#|>` for separating multiple keywords within this field.**\\n    - `relationship_description`:
      A concise explanation of the nature of the relationship between the source and
      target entities.\\n\\n3. **Record Types:**\\n  - `entity` is used only for entity
      rows and those rows always contain exactly 4 tuple parts total.\\n  - `relation`
      is used only for relationship rows and those rows always contain exactly 5 tuple
      parts total.\\n  - A row with two entity names plus relationship keywords and
      a relationship description must start with `relation`, never `entity`.\\n  -
      After the last entity row, switch prefixes to `relation` for every relationship
