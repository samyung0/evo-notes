      not be filled with content**. It serves strictly as a field separator.\\n  -
      Incorrect: `entity<|#|><entity_name><|entity_type|><entity_description>`\\n
      \ - Correct: `entity<|#|><entity_name><|#|><entity_type><|#|><entity_description>`\\n\\n6.
